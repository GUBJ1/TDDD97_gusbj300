<html>

<head>
    <link href="client.css" type="text/css" rel="stylesheet">
    <script src="client.js" type="text/javascript"></script>
    <script src="serverstub.js" type="text/javascript"></script>

    <template type="text/view" id="welcomeview">
        <div class="main-container">
            <img src="wimage.png" class="wimage" alt="wimage">
        
            <div class="right_side">
                <div class="right_side_container" id="login-container">
                    <form id="logInForm" onsubmit="signIn();return false;">
                        <div class="input-fields">
                            <div class="form-row">
                                <label for="logInEmail">Email</label>
                                <input type="text" id="logInEmail" class="input" required>
                            </div>
                            <div class="form-row">
                                <label for="password">Password</label>
                                <input type="password" id="password" name ="password" class="input" required>
                            </div>
                        </div>
                        <div class="btn-row">
                            <button class="login-btn">logIn</button>
                        </div>
                    </form>
                </div>
        
                <div class="right_side_container" id="signup-container">
                    <h2 id="signUpHeader">Sign up here</h2>
                    <form id="signUpForm" onsubmit="javascript:signUp();return false;">
                        <div class="input-fields">
                            <div class="form-row">
                                <label for="firstName">First name</label>
                                <input type="text" id="firstName" name="firstName" class="input" required>
                            </div>
                            <div class="form-row">
                                <label for="familyName">Family name</label>
                                <input type="text" id="familyName" name="familyName" class="input" required>
                            </div>
                            <div class="form-row">
                                <label for="gender">Gender</label>
                                <select id="gender" name="gender" class="input" required>
                                    <option value=""disabled selected>Select gender</option>
                                    <option value="female">Female</option>
                                    <option value="male">Male</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <label for="city">City</label>
                                <input type="text" id="city" name="city" class="input" required>
                            </div>
                            <div class="form-row">
                                <label for="country">Country</label>
                                <input type="text" id="country" name="country"class="input" required>
                            </div>
                            <div class="form-row">
                                <label for="signUpEmail">Email</label>
                                <input type="email" id="signUpEmail" name="signUpEmail" class="input" required>
                            </div>
                            <div class="form-row">
                                <label for="signUpPassword">Password</label>
                                <input type="password" id="signUpPassword" name="signUpPassword" class="input" required>
                            </div>
                            <div class="form-row">
                                <label for="repeatPassword">repeat PSW</label>
                                <input type="password" id="repeatPassword" name="repeatPassword" class="input" required>
                            </div>
                        </div>
                        <div id="signUpMessage">
                        </div>
                        <div class="btn-row">
                            <button id="signup_btn">signUp</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </template>

    <template type="text/view" id="profileview">
        <div class="profileView">        
            <div id="profileTopRow">   
                <div class="tabs" id="tabs">
                    <button onclick="showPanel(1)" class="profile_btn" >Home</button>
                    <button onclick="showPanel(2)" class="profile_btn" >Browse</button>
                    <button onclick="showPanel(3)" class="profile_btn" >Account</button>
                </div>
            </div>
            <div id="panel1" class="panel">
                <div id="Home">
                    <div id="listInfo">
                        <p>First name: <span id="profileFirstName"></span></p>
                        <p>Family name: <span id="profileFamilyName"></span></p>
                        <p>Gender: <span id="profileGender"></span></p>
                        <p>Email: <span id="profileEmail"></span></p>
                        <p>City: <span id="profileCity"></span></p>
                        <p>Country: <span id="profileCountry"></span></p>
                    </div>
                    <div id="wall">
                        <input type="text" id="wallInput" required>
                        <button id="postWall" onclick="postToMyWall()">Post</button>

                        <button onclick="reloadWall()">Reload wall</button>
                        <div id="wallList"></div>
                    </div>
                </div>
            </div>

            <div id="panel2" class="panel" style="display:none;">
                <div id="Browse">
                    <div class="form-row">
                        <input type ="text" id="otherEmail" placeholder="email">
                        <button id="browseUser" onclick="browse();return false;">browse</button>
                    </div>
                    <div id="browseMessage">
                    </div>
                    <div id="listInfo">
                        <p>First name: <span id="browseFirstName"></span></p>
                        <p>Family name: <span id="browseFamilyName"></span></p>
                        <p>Gender: <span id="browseGender"></span></p>
                        <p>Email: <span id="browseEmail"></span></p>
                        <p>City: <span id="browseCity"></span></p>
                        <p>Country: <span id="browseCountry"></span></p>
                    </div>
                    <div id="wall">
                        <input type="text" id="otherWallInput" required>
                        <button id="postWall" onclick="postToOtherWall(); return false;">Post</button>
            
                        <button onclick="reloadOtherWall(); return false;">Reload wall</button>
                        <div id="otherWallList"></div>
                    </div>
                </div>
            </div>


            <div id="panel3" class="panel" style="display:none;">
                <div class="form-row">
                    <label for="new_password">New password</label>
                    <input type="password" id="new_password" name="new_password" class="input" required>
                </div>
                <div class="form-row">
                    <label for="rpt_new_password">Repeat new password</label>
                    <input type="password" id="rpt_new_password" name="rpt_new_password" class="input" required>
                </div>
                <div class="form-row">
                    <label for="old_password">old password</label>
                    <input type="password" id="old_password" name="password" class="input" required>
                </div>
                    <button id="changePassowd" onclick="changePassword();return false;"> change password</button>
              
                <button id="signOut" onclick="signOut();return false;">sign out</button>
                <div id="passwordMessage">
                    <p id="lenError" style="display:none;">Password is too short</p>
                    <p id="matchError" style="display:none;">Passwords doesnt match</p>
                </div>
            </div>
        </div>
    </template>
</head>

<body>
    <div id="displayWindow"> </div>
</body>

</html>
